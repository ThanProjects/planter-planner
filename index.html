<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="description" content="DIY wood planter designs with full plans, materials lists, and step-by-step build instructions.">
  <title>Planter Planner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-inner">
      <button class="back-btn" id="backBtn" onclick="showCatalog()" aria-label="Back to catalog">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 4L6 10L12 16" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <h1 id="headerTitle">Planter Planner</h1>
    </div>
  </header>

  <main>
    <div id="catalogView">
      <p class="catalog-subtitle">6 wood planter designs — tap any card for full plans, materials, and step-by-step instructions.</p>
      <div class="catalog" id="catalog"></div>
    </div>
    <div id="detailView" class="hidden"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
